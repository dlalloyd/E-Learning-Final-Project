<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 600" fill="none">
  <title>UK National Parks Map</title>
  <style>
    text { font-family: system-ui, sans-serif; }
    .label { font-size: 8px; fill: #e2e8f0; }
    .park-label { font-size: 7px; fill: #86efac; font-weight: 600; }
    .region-label { font-size: 9px; fill: #94a3b8; font-weight: 500; }
    .country-label { font-size: 11px; fill: #cbd5e1; font-weight: 700; letter-spacing: 2px; }
  </style>

  <!-- Background -->
  <rect width="400" height="600" fill="#0f172a" rx="12"/>

  <!-- UK outline (simplified) -->
  <!-- Scotland -->
  <path d="M160,60 L180,50 L220,55 L240,70 L250,90 L245,110 L260,120 L255,140 L240,150
           L230,160 L220,155 L200,165 L190,160 L175,170 L165,155 L155,160 L150,145
           L160,130 L155,115 L165,100 L155,85 Z"
        fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <!-- England + Wales -->
  <path d="M175,170 L190,160 L200,165 L220,155 L230,160 L240,150 L255,165 L260,185
           L265,200 L260,220 L255,240 L260,260 L255,280 L250,300 L245,320 L240,340
           L235,360 L225,380 L215,390 L205,400 L195,410 L185,405 L175,395 L170,380
           L160,370 L155,355 L150,340 L145,325 L140,310 L150,295 L155,280 L150,265
           L155,250 L150,235 L145,220 L150,205 L155,190 L160,180 Z"
        fill="#1e293b" stroke="#334155" stroke-width="1.5"/>

  <!-- Wales outline (within) -->
  <path d="M150,265 L155,250 L150,235 L145,220 L150,205 L155,215 L160,230 L165,245
           L170,260 L175,275 L170,290 L160,295 L150,295 L155,280 Z"
        fill="#1e293b" stroke="#475569" stroke-width="0.8" stroke-dasharray="4,2"/>

  <!-- Country labels -->
  <text x="195" y="105" class="country-label" text-anchor="middle">SCOTLAND</text>
  <text x="215" y="290" class="country-label" text-anchor="middle">ENGLAND</text>
  <text x="148" y="250" class="country-label" text-anchor="middle" transform="rotate(-90, 148, 250)">WALES</text>

  <!-- National Parks as dots + labels -->
  <!-- Scotland -->
  <circle cx="180" cy="80" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="188" y="78" class="park-label">Cairngorms</text>
  <text x="188" y="86" class="label">(Largest UK park)</text>

  <circle cx="170" cy="120" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="122" y="118" class="park-label">Loch Lomond</text>
  <text x="120" y="126" class="label">&amp; The Trossachs</text>

  <!-- Northern England -->
  <circle cx="220" cy="175" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="228" y="173" class="park-label">Northumberland</text>
  <text x="228" y="181" class="label">(Darkest skies)</text>

  <circle cx="200" cy="200" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="208" y="198" class="park-label">Lake District</text>
  <text x="208" y="206" class="label">(NW England)</text>

  <circle cx="230" cy="210" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="238" y="208" class="park-label">Yorkshire Dales</text>

  <circle cx="245" cy="220" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="253" y="218" class="park-label">North York Moors</text>
  <text x="253" y="226" class="label">(NE coast)</text>

  <!-- Central England -->
  <circle cx="215" cy="250" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="223" y="248" class="park-label">Peak District</text>
  <text x="223" y="256" class="label">(First park, 1951)</text>

  <circle cx="240" cy="270" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="248" y="268" class="park-label">The Broads</text>
  <text x="248" y="276" class="label">(Norfolk wetlands)</text>

  <!-- Southern England -->
  <circle cx="225" cy="370" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="233" y="368" class="park-label">New Forest</text>

  <circle cx="230" cy="385" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="238" y="383" class="park-label">South Downs</text>
  <text x="238" y="391" class="label">(Newest, 2010)</text>

  <circle cx="190" cy="360" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="138" y="358" class="park-label">Dartmoor</text>

  <circle cx="175" cy="370" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="128" y="372" class="park-label">Exmoor</text>

  <!-- Wales -->
  <circle cx="155" cy="215" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="115" y="213" class="park-label">Snowdonia</text>
  <text x="111" y="221" class="label">(N. Wales)</text>

  <circle cx="150" cy="270" r="5" fill="#22c55e" opacity="0.8"/>
  <text x="100" y="268" class="park-label">Brecon Beacons</text>
  <text x="104" y="276" class="label">(S. Wales)</text>

  <circle cx="145" cy="295" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="87" y="293" class="park-label">Pembrokeshire</text>
  <text x="93" y="301" class="label">(Coast only)</text>

  <!-- Legend -->
  <rect x="15" y="440" width="370" height="145" rx="8" fill="#1e293b" stroke="#334155"/>
  <text x="200" y="460" class="region-label" text-anchor="middle" fill="#e2e8f0" font-weight="700">UK National Parks - Quick Reference</text>

  <circle cx="30" cy="478" r="4" fill="#22c55e" opacity="0.8"/>
  <text x="40" y="481" class="label">15 National Parks across England, Wales &amp; Scotland</text>

  <text x="30" y="500" class="label" fill="#86efac">SCOTLAND (2):</text>
  <text x="120" y="500" class="label">Cairngorms (largest), Loch Lomond &amp; Trossachs</text>

  <text x="30" y="515" class="label" fill="#86efac">N. ENGLAND (4):</text>
  <text x="120" y="515" class="label">Northumberland, Lake District, Yorkshire Dales, North York Moors</text>

  <text x="30" y="530" class="label" fill="#86efac">C. ENGLAND (2):</text>
  <text x="120" y="530" class="label">Peak District (1st, 1951), The Broads</text>

  <text x="30" y="545" class="label" fill="#86efac">S. ENGLAND (4):</text>
  <text x="120" y="545" class="label">Dartmoor, Exmoor, New Forest, South Downs (newest, 2010)</text>

  <text x="30" y="560" class="label" fill="#86efac">WALES (3):</text>
  <text x="120" y="560" class="label">Snowdonia (N), Brecon Beacons (S), Pembrokeshire Coast</text>

  <text x="30" y="578" class="label" fill="#64748b">N. Ireland has no national parks (uses AONBs instead)</text>
</svg>
